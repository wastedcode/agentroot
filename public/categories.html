<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories — AgentRoot</title>
  <meta name="description" content="Browse AI agents by category: research, finance, devtools, data, communication, automation, media, and security.">
  <meta property="og:title" content="Agent Categories — AgentRoot">
  <meta property="og:description" content="Browse the DNS-native agent registry by capability category.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://agentroot.io/categories.html">
  <meta property="og:site_name" content="AgentRoot">
  <style>
    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24; --border: #2a2a3a;
      --text: #e8e8f0; --muted: #888899; --accent: #6366f1; --accent2: #818cf8;
      --green: #34d399; --yellow: #fbbf24; --red: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }

    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text); }
    .logo-icon { font-size: 24px; }
    .logo-text { font-size: 18px; font-weight: 700; }
    .logo-tagline { font-size: 12px; color: var(--muted); }
    nav { display: flex; align-items: center; gap: 4px; }
    nav a { color: var(--muted); text-decoration: none; font-size: 14px; padding: 6px 12px; border-radius: 6px; transition: color 0.15s, background 0.15s; }
    nav a:hover { color: var(--text); background: var(--surface2); }
    nav a.active { color: var(--accent2); }

    .page { max-width: 900px; margin: 0 auto; padding: 0 24px; }

    .hero { padding: 64px 0 48px; text-align: center; }
    .hero h1 { font-size: 36px; font-weight: 900; letter-spacing: -1px; margin-bottom: 12px; }
    .hero p { font-size: 16px; color: var(--muted); }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 64px;
    }
    .category-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 20px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, transform 0.15s;
      cursor: pointer;
      text-align: center;
    }
    .category-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .category-card.selected { border-color: var(--accent); background: rgba(99,102,241,0.08); }
    .cat-emoji { font-size: 36px; margin-bottom: 12px; }
    .cat-label { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .cat-desc { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; }
    .cat-count {
      display: inline-block;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); padding: 2px 10px; border-radius: 12px;
      font-size: 12px; font-weight: 600;
    }
    .category-card.selected .cat-count { background: rgba(99,102,241,0.15); color: var(--accent2); border-color: var(--accent); }

    .results-section { margin-bottom: 64px; }
    .results-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    .results-title { font-size: 20px; font-weight: 700; }
    .results-count { font-size: 13px; color: var(--muted); }
    .back-link { color: var(--accent2); text-decoration: none; font-size: 13px; cursor: pointer; }
    .back-link:hover { text-decoration: underline; }

    .agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .agent-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; text-decoration: none;
      color: var(--text); transition: border-color 0.15s, transform 0.15s; display: block;
    }
    .agent-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
    .agent-name { font-weight: 700; font-size: 16px; }
    .agent-domain { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .agent-desc { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; min-height: 40px; }
    .caps-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .cap { background: var(--surface2); border: 1px solid var(--border); color: var(--accent2); padding: 3px 10px; border-radius: 20px; font-size: 11px; }
    .cat-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: rgba(99,102,241,0.1); color: var(--accent2); border: 1px solid rgba(99,102,241,0.2); white-space: nowrap; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-top: 5px; flex-shrink: 0; }
    .empty { text-align: center; padding: 64px; color: var(--muted); }
    .empty a { color: var(--accent2); }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/">
      <span class="logo-icon">🌐</span>
      <div>
        <div class="logo-text">AgentRoot</div>
        <div class="logo-tagline">Agent Registry</div>
      </div>
    </a>
    <nav>
      <a href="/">Registry</a>
      <a href="/howitworks.html">How It Works</a>
      <a href="/api.html">API Docs</a>
      <a href="/spec.html">Spec</a>
      <a href="/submit.html">Submit</a>
    </nav>
  </header>

  <div class="page">
    <div class="hero">
      <h1>Browse by Category</h1>
      <p>Explore agents organized by what they can do. Click a category to filter the registry.</p>
    </div>

    <div class="category-grid" id="category-grid">
      <div class="empty">Loading categories...</div>
    </div>

    <div class="results-section" id="results-section" style="display:none">
      <div class="results-header">
        <div class="results-title" id="results-title">Agents</div>
        <div style="display:flex;align-items:center;gap:16px">
          <span class="results-count" id="results-count"></span>
          <span class="back-link" onclick="clearCategory()">← All categories</span>
        </div>
      </div>
      <div class="agent-grid" id="agent-grid"></div>
    </div>
  </div>

  <script>
    let selectedCategory = null;
    let categories = [];

    function esc(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function loadCategories() {
      const r = await fetch('/api/categories').then(r => r.json());
      categories = r.categories || [];
      renderCategories();

      // Check URL for initial category
      const params = new URLSearchParams(location.search);
      const cat = params.get('category');
      if (cat) selectCategory(cat);
    }

    function renderCategories() {
      const grid = document.getElementById('category-grid');
      grid.innerHTML = categories.map(cat => `
        <div class="category-card ${selectedCategory === cat.id ? 'selected' : ''}" onclick="selectCategory('${cat.id}')">
          <div class="cat-emoji">${cat.emoji}</div>
          <div class="cat-label">${esc(cat.label)}</div>
          <div class="cat-desc">${esc(cat.desc)}</div>
          <span class="cat-count">${cat.count} agent${cat.count !== 1 ? 's' : ''}</span>
        </div>
      `).join('');
    }

    async function selectCategory(catId) {
      selectedCategory = catId;
      const cat = categories.find(c => c.id === catId);
      
      // Update URL
      const url = new URL(location.href);
      url.searchParams.set('category', catId);
      history.pushState({}, '', url);
      
      // Update cards
      renderCategories();
      
      // Load agents
      document.getElementById('results-section').style.display = 'block';
      document.getElementById('results-title').textContent = `${cat ? cat.emoji + ' ' + cat.label : catId} Agents`;
      document.getElementById('agent-grid').innerHTML = '<div class="empty">Loading...</div>';
      
      const r = await fetch(`/api/agents?category=${encodeURIComponent(catId)}`).then(r => r.json());
      const agents = r.agents || [];
      document.getElementById('results-count').textContent = `${agents.length} agent${agents.length !== 1 ? 's' : ''}`;
      
      if (!agents.length) {
        document.getElementById('agent-grid').innerHTML = '<div class="empty">No agents in this category yet. <a href="/submit.html">Register yours →</a></div>';
        return;
      }
      
      document.getElementById('agent-grid').innerHTML = agents.map(a => `
        <a class="agent-card" href="/agents/${encodeURIComponent(a.domain)}">
          <div class="card-header">
            <div>
              <div class="agent-name">${esc(a.name || a.domain)}</div>
              <div class="agent-domain">${esc(a.domain)}</div>
            </div>
            <div class="status-dot"></div>
          </div>
          <div class="agent-desc">${esc(a.description || 'No description provided.')}</div>
          <div class="caps-list">
            ${(a.capabilities || '').split(',').filter(Boolean).slice(0, 4).map(c => `<span class="cap">${esc(c.trim())}</span>`).join('')}
            ${a.category ? `<span class="cat-badge">${esc(a.category)}</span>` : ''}
          </div>
        </a>
      `).join('');
      
      // Scroll to results
      document.getElementById('results-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function clearCategory() {
      selectedCategory = null;
      const url = new URL(location.href);
      url.searchParams.delete('category');
      history.pushState({}, '', url);
      renderCategories();
      document.getElementById('results-section').style.display = 'none';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    loadCategories();
  </script>
</body>
</html>
